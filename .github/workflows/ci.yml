name: Frontend Workshop Demo

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'chore/**'
      - main # อย่าลืมลบ ถ้าใช้ flow ปกติ
  pull_request:
    branches:
      - main
jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello Frontend App"
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      - run: node -v
      - run: npm ci # clean install
      - run: npm run lint
  build-job:
    runs-on: ubuntu-latest
    needs: lint-job
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6
      - name: Setup nodejs v24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci # clean install
      - name: Build Project
        run: npm run build