name: Deploy to GitHub Page

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+' # 1.0.0
      #- '*.*.*'

jobs:
  build-prod-job:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6
      - name: Setup nodejs v24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci # clean install แทน npm install
      - name: Build Project (Production and create dist folder)
        run: npm run build
      - name: Upload dist folder artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist-production
          path: dist