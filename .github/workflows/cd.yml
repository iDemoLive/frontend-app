name: Deploy to GitHub Page

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      #- '*.*.*'

jobs:
  build-prod-job:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6
      - name: Setup nodejs v24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci # clean install
      - name: Build Project
        run: npm run build