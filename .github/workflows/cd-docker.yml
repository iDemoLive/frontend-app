name: Buil and Deploy Docker

on:
  push:
    tags:
      - '*.*.*' # 3.0.0

jobs:
  buil-image-and-push-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Buil docker image and push to GitHub Regigtry
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          image: ${{ github.event.repository.name }}
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

  auto-deploy-docker-job:
    runs-on: ubuntu-latest
    needs: buil-image-and-push-job
    environment: production
    env:
      CONTANNER_NAME: ${{ github.actor }}
      SERVER_PORT: 8339 # http://45.32.108.242:8339
      DOCKER_IMAGE_URL: 'ghcr.io/idemolive/${{ github.event.repository.name}}:${{ github.ref_name}}'
      GITHUB_USER: 'idemolive'  # github.actor = iDemoLive
    steps:
      - name: Executing remote ssh using password to production server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: '22'
          script: |
            docker -v
            pwd
            ls
            docker logout ghcr.io
            docker login -u ${{ env.GITHUB_USER }} -p ${{ secrets.GITHUB_TOKEN }} ghcr.io/${{ env.GITHUB_USER }}/${{ github.event.repository.name}}
            docker pull ${{ env.DOCKER_IMAGE_URL }}
            docker rm -f ${{ env.CONTANNER_NAME }} | true
            docker run --restart=always -d --name ${{ env.CONTANNER_NAME }} -p ${{ env.SERVER_PORT }}:80 ${{ env.DOCKER_IMAGE_URL }}
